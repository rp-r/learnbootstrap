<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Net Ninja Pro</title>

    <style>
        section {
            padding: 60px 0;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-md navbar-light bg-light">
    <div class="container-xxl">
        <a href="#intro" class="navbar-brand">
            <span class="fw-bold text-secondary">
                Net Ninja Pro - The Book
            </span>
        </a>

        <!-- Mobile Toggle Button -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
            data-bs-target="#main-nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navbar Links -->
        <div class="collapse navbar-collapse justify-content-end align-items-center" id="main-nav">
            <ul class="navbar-nav">

                <li class="nav-item">
                    <a class="nav-link" href="#topics">Topics</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#reviews">Reviews</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#contact">Contact</a>
                </li>

                <li class="nav-item d-md-none">
                    <a class="nav-link" href="#pricing">Pricing</a>
                </li>

                <li class="nav-item ms-2 d-none d-md-inline">
                    <a class="btn btn-secondary" href="#pricing">Buy Now</a>
                </li>

            </ul>
        </div>
    </div>
</nav>


<!-- INTRO SECTION -->
<section id="intro">
    <div class="container-lg">
        <div class="row justify-content-center align-items-center">

            <!-- TEXT -->
            <div class="col-md-5 text-center text-md-start">
                <h1>
                    <div class="display-2">Black-Belt</div>
                    <div class="display-5 text-muted">Your Coding Skills</div>
                </h1>

                <p class="lead my-4 text-muted">
                    Lorem ipsum dolor sit amet, consectetur adipisicing elit.
                </p>

                <a href="#pricing" class="btn btn-secondary btn-lg">Buy Now</a>
            </div>

            <!-- IMAGE -->
            <div class="col-md-5 text-center d-none d-md-block">
                <img class="img-fluid" src="assets/ebook-cover.png" alt="ebook">
            </div>

        </div>
    </div>
</section>


<!-- PRICING SECTION (placeholder so links work) -->
<section id="pricing">
    <div class="container-lg">
        <h2 class="text-center">Pricing</h2>
        <p class="text-center text-muted">Plans coming soon...</p>
    </div>
</section>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
